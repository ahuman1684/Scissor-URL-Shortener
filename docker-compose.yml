version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scissor
      POSTGRES_PASSWORD: scissor123
      POSTGRES_DB: scissor
    ports: ['5432:5432']
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scissor']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      # bash /dev/tcp avoids nc availability issues in this Debian-based image
      test: ['CMD', 'bash', '-c', 'echo > /dev/tcp/localhost/2181']
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports: ['9092:9092']
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:9092', '--list']
      interval: 10s
      timeout: 15s
      retries: 20
      start_period: 45s

  server:
    build: ./server
    ports: ['4000:4000']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://scissor:scissor123@postgres:5432/scissor
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:29092
      BASE_URL: http://localhost:4000
      MACHINE_ID: 1
      PORT: 4000
    restart: on-failure

  consumer:
    build: ./consumer
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://scissor:scissor123@postgres:5432/scissor
      KAFKA_BROKER: kafka:29092
    restart: on-failure

  client:
    build: ./client
    ports: ['3000:3000']
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:4000

volumes:
  pgdata:
